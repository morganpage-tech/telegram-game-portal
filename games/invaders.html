<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .restart-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Space Invaders</h1>
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions">
        <p>← → Move | Space Shoot</p>
    </div>

    <div class="game-over-overlay" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 175, y: 450, width: 50, height: 30, speed: 5 };
        let bullets = [];
        let invaders = [];
        let invaderBullets = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let gameLoop;
        let invaderDirection = 1;
        let invaderSpeed = 1;
        let lastShot = 0;
        let keys = {};

        function initInvaders() {
            invaders = [];
            const rows = 4;
            const cols = 8;
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    invaders.push({
                        x: 50 + col * 40,
                        y: 50 + row * 35,
                        width: 30,
                        height: 25,
                        alive: true
                    });
                }
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Cannon
            ctx.fillRect(player.x + 20, player.y - 10, 10, 15);
        }

        function drawInvaders() {
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = '#ff0066';
                    ctx.fillRect(invader.x, invader.y, invader.width, invader.height);

                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(invader.x + 5, invader.y + 8, 6, 6);
                    ctx.fillRect(invader.x + 19, invader.y + 8, 6, 6);
                }
            });
        }

        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 10);
            });

            ctx.fillStyle = '#ff0000';
            invaderBullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 10);
            });
        }

        function update() {
            if (gameOver) return;

            // Player movement
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // Shooting
            if (keys[' '] && Date.now() - lastShot > 300) {
                bullets.push({ x: player.x + player.width / 2 - 2, y: player.y });
                lastShot = Date.now();
            }

            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.y -= 8;
                return bullet.y > 0;
            });

            // Update invader bullets
            invaderBullets = invaderBullets.filter(bullet => {
                bullet.y += 4;
                return bullet.y < canvas.height;
            });

            // Move invaders
            let moveDown = false;
            invaders.forEach(invader => {
                if (invader.alive) {
                    invader.x += invaderDirection * invaderSpeed;
                    if (invader.x <= 0 || invader.x >= canvas.width - invader.width) {
                        moveDown = true;
                    }
                }
            });

            if (moveDown) {
                invaderDirection *= -1;
                invaders.forEach(invader => {
                    invader.y += 20;
                });
            }

            // Invader shooting
            if (Math.random() < 0.02) {
                const aliveInvaders = invaders.filter(i => i.alive);
                if (aliveInvaders.length > 0) {
                    const shooter = aliveInvaders[Math.floor(Math.random() * aliveInvaders.length)];
                    invaderBullets.push({ x: shooter.x + shooter.width / 2, y: shooter.y + shooter.height });
                }
            }

            // Check bullet collisions
            bullets.forEach((bullet, bulletIndex) => {
                invaders.forEach(invader => {
                    if (invader.alive &&
                        bullet.x < invader.x + invader.width &&
                        bullet.x + 4 > invader.x &&
                        bullet.y < invader.y + invader.height &&
                        bullet.y + 10 > invader.y) {
                        invader.alive = false;
                        bullets.splice(bulletIndex, 1);
                        score += 10;
                        document.getElementById('score').textContent = score;
                    }
                });
            });

            // Check invader bullet collisions
            invaderBullets.forEach((bullet, index) => {
                if (bullet.x < player.x + player.width &&
                    bullet.x + 4 > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + 10 > player.y) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    invaderBullets.splice(index, 1);
                    if (lives <= 0) {
                        endGame();
                    }
                }
            });

            // Check if invaders reached bottom
            invaders.forEach(invader => {
                if (invader.alive && invader.y + invader.height >= player.y) {
                    endGame();
                }
            });

            // Check win condition
            if (invaders.every(i => !i.alive)) {
                invaderSpeed += 0.5;
                initInvaders();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawInvaders();
            drawBullets();
        }

        function gameLoopFn() {
            update();
            draw();
            if (!gameOver) {
                gameLoop = requestAnimationFrame(gameLoopFn);
            }
        }

        function startGame() {
            player.x = 175;
            bullets = [];
            invaderBullets = [];
            score = 0;
            lives = 3;
            gameOver = false;
            invaderSpeed = 1;
            invaderDirection = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('gameOver').classList.remove('show');

            initInvaders();
            gameLoopFn();
        }

        function endGame() {
            gameOver = true;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Touch controls
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const dx = touchX - touchStartX;
            if (Math.abs(dx) > 10) {
                if (dx > 0) keys['ArrowRight'] = true;
                else keys['ArrowLeft'] = true;
            }
            touchStartX = touchX;
        });

        canvas.addEventListener('touchend', () => {
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            if (!gameOver) {
                keys[' '] = true;
                setTimeout(() => keys[' '] = false, 100);
            }
        });

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        startGame();
    </script>
</body>
</html>
