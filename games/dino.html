<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            font-size: 20px;
            margin-bottom: 10px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .restart-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Dino Run</h1>
    <div class="stats">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="300"></canvas>
    <div class="instructions">
        <p>Tap or Space to jump • Avoid obstacles!</p>
    </div>

    <div class="game-over-overlay" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let dino = { x: 50, y: 200, width: 40, height: 50, velocity: 0, jumping: false };
        let obstacles = [];
        let score = 0;
        let gameOver = false;
        let gameLoop;
        let gravity = 0.8;
        let jumpStrength = -15;
        let groundY = 250;
        let gameSpeed = 5;

        function drawDino() {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            // Eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(dino.x + 25, dino.y + 5, 10, 10);
            ctx.fillStyle = '#000';
            ctx.fillRect(dino.x + 30, dino.y + 7, 5, 5);

            // Legs
            ctx.fillStyle = '#4CAF50';
            if (!dino.jumping) {
                ctx.fillRect(dino.x + 5, dino.y + dino.height, 10, 15);
                ctx.fillRect(dino.x + 25, dino.y + dino.height, 10, 15);
            }
        }

        function drawObstacles() {
            ctx.fillStyle = '#ff6b6b';
            obstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });
        }

        function drawGround() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, groundY + dino.height, canvas.width, 10);
        }

        function jump() {
            if (!dino.jumping && !gameOver) {
                dino.velocity = jumpStrength;
                dino.jumping = true;
            }
        }

        function update() {
            if (gameOver) return;

            // Apply gravity
            dino.velocity += gravity;
            dino.y += dino.velocity;

            // Ground collision
            if (dino.y >= groundY - dino.height) {
                dino.y = groundY - dino.height;
                dino.velocity = 0;
                dino.jumping = false;
            }

            // Spawn obstacles
            if (Math.random() < 0.02) {
                const height = 30 + Math.random() * 30;
                obstacles.push({
                    x: canvas.width,
                    y: groundY - height,
                    width: 20,
                    height: height
                });
            }

            // Move obstacles
            obstacles = obstacles.filter(obstacle => {
                obstacle.x -= gameSpeed;
                return obstacle.x > -obstacle.width;
            });

            // Check collisions
            obstacles.forEach(obstacle => {
                if (dino.x < obstacle.x + obstacle.width &&
                    dino.x + dino.width > obstacle.x &&
                    dino.y < obstacle.y + obstacle.height &&
                    dino.y + dino.height > obstacle.y) {
                    endGame();
                }
            });

            // Update score
            score++;
            document.getElementById('score').textContent = score;

            // Increase difficulty
            if (score % 500 === 0) {
                gameSpeed += 0.5;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();
            drawDino();
            drawObstacles();
        }

        function gameLoopFn() {
            update();
            draw();
            if (!gameOver) {
                gameLoop = requestAnimationFrame(gameLoopFn);
            }
        }

        function startGame() {
            dino.y = 200;
            dino.velocity = 0;
            dino.jumping = false;
            obstacles = [];
            score = 0;
            gameOver = false;
            gameSpeed = 5;

            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');

            gameLoopFn();
        }

        function endGame() {
            gameOver = true;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        startGame();
    </script>
</body>
</html>
