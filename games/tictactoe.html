<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        .status {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            margin: 0 auto;
        }
        
        .cell {
            width: 100px;
            height: 100px;
            background: #0f3460;
            border: none;
            border-radius: 10px;
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        
        .cell:hover:not(.taken) {
            background: #16213e;
        }
        
        .cell.taken {
            cursor: not-allowed;
        }
        
        .cell.x {
            color: #4ade80;
        }
        
        .cell.o {
            color: #f472b6;
        }
        
        .cell.winner {
            background: #3390ec !important;
            animation: pulse 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .restart-btn {
            background: #3390ec;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .restart-btn:hover {
            background: #2a7bc7;
        }
        
        .scores {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="status" id="status">Your turn (X)</div>
        <div class="board" id="board"></div>
        <div class="scores">
            <div>X: <span id="scoreX">0</span></div>
            <div>O: <span id="scoreO">0</span></div>
        </div>
        <button class="restart-btn" id="restartBtn">New Game</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const restartBtn = document.getElementById('restartBtn');
        const scoreXElement = document.getElementById('scoreX');
        const scoreOElement = document.getElementById('scoreO');

        let currentPlayer = 'X';
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let scoreX = 0;
        let scoreO = 0;

        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6] // Diagonals
        ];

        function initBoard() {
            board.innerHTML = '';
            boardState.forEach((cell, index) => {
                const cellElement = document.createElement('button');
                cellElement.className = 'cell';
                cellElement.dataset.index = index;
                if (cell) {
                    cellElement.textContent = cell;
                    cellElement.classList.add('taken', cell.toLowerCase());
                }
                cellElement.addEventListener('click', handleCellClick);
                board.appendChild(cellElement);
            });
        }

        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);
            
            if (boardState[index] !== '' || !gameActive) return;
            
            makeMove(index, currentPlayer);
            
            if (gameActive) {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusElement.textContent = `${currentPlayer}'s turn`;
                
                // AI move for O
                if (currentPlayer === 'O' && gameActive) {
                    setTimeout(makeAIMove, 300);
                }
            }
        }

        function makeMove(index, player) {
            boardState[index] = player;
            const cellElement = board.children[index];
            cellElement.textContent = player;
            cellElement.classList.add('taken', player.toLowerCase());
            
            if (checkWin(player)) {
                gameActive = false;
                statusElement.textContent = `${player} wins! 🎉`;
                highlightWinningCells(player);
                if (player === 'X') {
                    scoreX++;
                    scoreXElement.textContent = scoreX;
                } else {
                    scoreO++;
                    scoreOElement.textContent = scoreO;
                }
            } else if (boardState.every(cell => cell !== '')) {
                gameActive = false;
                statusElement.textContent = "It's a draw! 🤝";
            }
        }

        function makeAIMove() {
            if (!gameActive) return;
            
            // Try to win
            for (let i = 0; i < 9; i++) {
                if (boardState[i] === '') {
                    boardState[i] = 'O';
                    if (checkWin('O')) {
                        boardState[i] = '';
                        makeMove(i, 'O');
                        return;
                    }
                    boardState[i] = '';
                }
            }
            
            // Block X from winning
            for (let i = 0; i < 9; i++) {
                if (boardState[i] === '') {
                    boardState[i] = 'X';
                    if (checkWin('X')) {
                        boardState[i] = '';
                        makeMove(i, 'O');
                        return;
                    }
                    boardState[i] = '';
                }
            }
            
            // Take center if available
            if (boardState[4] === '') {
                makeMove(4, 'O');
                return;
            }
            
            // Random move
            const availableMoves = boardState
                .map((cell, index) => cell === '' ? index : null)
                .filter(index => index !== null);
            
            if (availableMoves.length > 0) {
                const randomIndex = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                makeMove(randomIndex, 'O');
            }
        }

        function checkWin(player) {
            return winningCombinations.some(combination => {
                return combination.every(index => boardState[index] === player);
            });
        }

        function highlightWinningCells(player) {
            winningCombinations.forEach(combination => {
                if (combination.every(index => boardState[index] === player)) {
                    combination.forEach(index => {
                        board.children[index].classList.add('winner');
                    });
                }
            });
        }

        function resetGame() {
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            statusElement.textContent = "Your turn (X)";
            initBoard();
        }

        restartBtn.addEventListener('click', resetGame);

        // Initialize
        initBoard();
    </script>
</body>
</html>
