<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .score-display {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .game-board {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.15s ease;
        }

        .cell.empty {
            background: rgba(255, 255, 255, 0.05);
        }

        .instructions {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="score-display">Score: <span id="score">0</span></div>
    <div class="game-board">
        <div class="grid" id="grid"></div>
    </div>
    <div class="instructions">
        <p>Use arrow keys or swipe to move tiles</p>
        <p>Merge matching numbers to reach 2048!</p>
    </div>

    <script>
        const SIZE = 4;
        let grid = [];
        let score = 0;

        function init() {
            grid = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            addNewTile();
            addNewTile();
            render();
        }

        function addNewTile() {
            const emptyCells = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const {row, col} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[row][col] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function getColor(value) {
            const colors = {
                2: '#eee4da',
                4: '#ede0c8',
                8: '#f2b179',
                16: '#f59563',
                32: '#f67c5f',
                64: '#f65e3b',
                128: '#edcf72',
                256: '#edcc61',
                512: '#edc850',
                1024: '#edc53f',
                2048: '#edc22e'
            };
            return colors[value] || '#3c3a32';
        }

        function render() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';

            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[i][j] === 0) {
                        cell.classList.add('empty');
                    } else {
                        cell.textContent = grid[i][j];
                        cell.style.background = getColor(grid[i][j]);
                        cell.style.color = grid[i][j] <= 4 ? '#776e65' : '#f9f6f2';
                    }
                    gridElement.appendChild(cell);
                }
            }

            document.getElementById('score').textContent = score;
        }

        function slide(row) {
            let arr = row.filter(val => val !== 0);
            let missing = SIZE - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < SIZE - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    row[i + 1] = 0;
                    score += row[i];
                }
            }
            return row;
        }

        function move(direction) {
            let moved = false;
            const oldGrid = JSON.stringify(grid);

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < SIZE; i++) {
                    let row = [...grid[i]];
                    if (direction === 'right') row.reverse();
                    row = slide(row);
                    row = combine(row);
                    row = slide(row);
                    if (direction === 'right') row.reverse();
                    grid[i] = row;
                }
            } else {
                for (let j = 0; j < SIZE; j++) {
                    let col = [];
                    for (let i = 0; i < SIZE; i++) {
                        col.push(grid[i][j]);
                    }
                    if (direction === 'down') col.reverse();
                    col = slide(col);
                    col = combine(col);
                    col = slide(col);
                    if (direction === 'down') col.reverse();
                    for (let i = 0; i < SIZE; i++) {
                        grid[i][j] = col[i];
                    }
                }
            }

            if (oldGrid !== JSON.stringify(grid)) {
                addNewTile();
                moved = true;
            }

            render();

            if (isGameOver()) {
                setTimeout(() => alert(`Game Over! Score: ${score}`), 100);
            }

            if (isWin()) {
                setTimeout(() => alert(`You Win! Score: ${score}`), 100);
            }

            return moved;
        }

        function isGameOver() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] === 0) return false;
                    if (j < SIZE - 1 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < SIZE - 1 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }

        function isWin() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (grid[i][j] === 2048) return true;
                }
            }
            return false;
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) move('right');
                    else move('left');
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy > 0) move('down');
                    else move('up');
                }
            }
        });

        // Telegram WebApp integration
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        init();
    </script>
</body>
</html>
