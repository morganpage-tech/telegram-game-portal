<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breakout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-container { text-align: center; }
        .score {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 15px;
        }
        canvas {
            border: 2px solid #3390ec;
            border-radius: 8px;
            background: #0f3460;
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 15px;
            color: #a0a0a0;
            font-size: 14px;
        }
        .start-btn {
            background: #3390ec;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div class="controls">
            <p>Move mouse or touch to control paddle</p>
        </div>
        <button class="start-btn" id="startBtn">Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        const PADDLE_WIDTH = 80;
        const PADDLE_HEIGHT = 10;
        const BALL_SIZE = 10;
        const BRICK_ROWS = 5;
        const BRICK_COLS = 8;
        const BRICK_HEIGHT = 25;
        const BRICK_WIDTH = (canvas.width - 40) / BRICK_COLS;

        let paddleX = canvas.width / 2 - PADDLE_WIDTH / 2;
        let ball = { x: canvas.width / 2, y: canvas.height - 50, dx: 4, dy: -4 };
        let bricks = [];
        let score = 0;
        let gameRunning = false;
        let animationId = null;

        function init() {
            paddleX = canvas.width / 2 - PADDLE_WIDTH / 2;
            ball = { x: canvas.width / 2, y: canvas.height - 50, dx: 4, dy: -4 };
            score = 0;
            scoreElement.textContent = score;
            
            // Create bricks
            bricks = [];
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    bricks.push({
                        x: col * BRICK_WIDTH + 20,
                        y: row * BRICK_HEIGHT + 40,
                        width: BRICK_WIDTH - 5,
                        height: BRICK_HEIGHT - 5,
                        color: `hsl(${row * 40}, 70%, 50%)`,
                        active: true
                    });
                }
            }
            draw();
        }

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x <= 0 || ball.x >= canvas.width - BALL_SIZE) {
                ball.dx = -ball.dx;
            }
            if (ball.y <= 0) {
                ball.dy = -ball.dy;
            }
            if (ball.y >= canvas.height - BALL_SIZE) {
                gameOver();
                return;
            }

            // Paddle collision
            if (ball.y >= canvas.height - 30 && 
                ball.x >= paddleX && 
                ball.x <= paddleX + PADDLE_WIDTH) {
                ball.dy = -Math.abs(ball.dy);
            }

            // Brick collision
            bricks.forEach(brick => {
                if (!brick.active) return;
                if (ball.x >= brick.x && 
                    ball.x <= brick.x + brick.width &&
                    ball.y >= brick.y && 
                    ball.y <= brick.y + brick.height) {
                    ball.dy = -ball.dy;
                    brick.active = false;
                    score += 10;
                    scoreElement.textContent = score;
                }
            });

            // Win condition
            if (bricks.every(b => !b.active)) {
                alert('You Win! 🎉');
                init();
            }
        }

        function draw() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bricks
            bricks.forEach(brick => {
                if (!brick.active) return;
                ctx.fillStyle = brick.color;
                ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
            });

            // Draw paddle
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(paddleX, canvas.height - 20, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Draw ball
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ball.x + BALL_SIZE / 2, ball.y + BALL_SIZE / 2, BALL_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            alert(`Game Over! Score: ${score}`);
            init();
        }

        function startGame() {
            init();
            gameRunning = true;
            startBtn.textContent = 'Restart';
            gameLoop();
        }

        // Controls
        function movePaddle(clientX) {
            const rect = canvas.getBoundingClientRect();
            const relativeX = clientX - rect.left;
            paddleX = relativeX - PADDLE_WIDTH / 2;
            paddleX = Math.max(0, Math.min(canvas.width - PADDLE_WIDTH, paddleX));
        }

        canvas.addEventListener('mousemove', (e) => movePaddle(e.clientX));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            movePaddle(e.touches[0].clientX);
        });

        startBtn.addEventListener('click', startGame);

        init();
    </script>
</body>
</html>
