<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-container { text-align: center; }
        .score {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 15px;
        }
        canvas {
            border: 2px solid #3390ec;
            border-radius: 8px;
            background: #0f3460;
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 15px;
            color: #a0a0a0;
            font-size: 14px;
        }
        .start-btn {
            background: #3390ec;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="300" height="400"></canvas>
        <div class="controls">
            <p>Tap or press Space to flap</p>
        </div>
        <button class="start-btn" id="startBtn">Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 120;
        const PIPE_WIDTH = 50;

        let bird = { x: 50, y: 200, velocity: 0 };
        let pipes = [];
        let score = 0;
        let gameRunning = false;
        let animationId = null;

        function init() {
            bird = { x: 50, y: 200, velocity: 0 };
            pipes = [];
            score = 0;
            scoreElement.textContent = score;
            draw();
        }

        function flap() {
            if (!gameRunning) return;
            bird.velocity = FLAP_STRENGTH;
        }

        function update() {
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Generate pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 150) {
                const gapY = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({ x: canvas.width, gapY: gapY, passed: false });
            }

            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;

                // Score
                if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
                    pipe.passed = true;
                    score++;
                    scoreElement.textContent = score;
                }

                // Collision
                if (bird.x + 20 > pipe.x && bird.x < pipe.x + PIPE_WIDTH) {
                    if (bird.y < pipe.gapY || bird.y + 20 > pipe.gapY + PIPE_GAP) {
                        gameOver();
                    }
                }
            });

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);

            // Boundary collision
            if (bird.y < 0 || bird.y > canvas.height - 20) {
                gameOver();
            }
        }

        function draw() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bird
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(bird.x, bird.y, 20, 20);

            // Draw pipes
            ctx.fillStyle = '#22c55e';
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.gapY);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.gapY + PIPE_GAP, PIPE_WIDTH, canvas.height - pipe.gapY - PIPE_GAP);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            alert(`Game Over! Score: ${score}`);
            init();
        }

        function startGame() {
            init();
            gameRunning = true;
            startBtn.textContent = 'Restart';
            gameLoop();
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning) startGame();
                else flap();
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning) startGame();
            else flap();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameRunning) startGame();
            else flap();
        });

        startBtn.addEventListener('click', startGame);

        init();
    </script>
</body>
</html>
