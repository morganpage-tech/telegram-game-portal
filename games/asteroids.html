<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asteroids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .controls-mobile {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            touch-action: none;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .fire-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 100, 100, 0.5);
        }

        @media (max-width: 600px) {
            .controls-mobile {
                display: flex;
            }
            .instructions {
                display: none;
            }
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .restart-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Asteroids</h1>
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions">
        <p>↑ Thrust | ← → Rotate | Space Fire</p>
    </div>
    <div class="controls-mobile">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn fire-btn" id="fireBtn">🔥</button>
        <button class="control-btn" id="rightBtn">▶</button>
    </div>

    <div class="game-over-overlay" id="gameOver">
        <h2>Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let ship = { x: 200, y: 250, angle: -Math.PI / 2, vx: 0, vy: 0, radius: 15 };
        let bullets = [];
        let asteroids = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let gameLoop;
        let keys = {};

        function createAsteroid(x, y, size) {
            const speed = 1 + Math.random() * 2;
            const angle = Math.random() * Math.PI * 2;
            return {
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: size,
                vertices: generateAsteroidVertices(size)
            };
        }

        function generateAsteroidVertices(radius) {
            const vertices = [];
            const numVertices = 8 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numVertices; i++) {
                const angle = (i / numVertices) * Math.PI * 2;
                const variance = 0.7 + Math.random() * 0.6;
                vertices.push({
                    x: Math.cos(angle) * radius * variance,
                    y: Math.sin(angle) * radius * variance
                });
            }
            return vertices;
        }

        function initAsteroids() {
            asteroids = [];
            for (let i = 0; i < 5; i++) {
                let x, y;
                do {
                    x = Math.random() * canvas.width;
                    y = Math.random() * canvas.height;
                } while (Math.hypot(x - ship.x, y - ship.y) < 100);
                asteroids.push(createAsteroid(x, y, 40 + Math.random() * 20));
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle + Math.PI / 2);

            // Ship body
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -ship.radius);
            ctx.lineTo(-ship.radius * 0.7, ship.radius);
            ctx.lineTo(ship.radius * 0.7, ship.radius);
            ctx.closePath();
            ctx.stroke();

            // Thruster flame
            if (keys['ArrowUp']) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-ship.radius * 0.3, ship.radius);
                ctx.lineTo(0, ship.radius + 15 + Math.random() * 5);
                ctx.lineTo(ship.radius * 0.3, ship.radius);
                ctx.closePath();
                ctx.fill();
            }

            ctx.restore();
        }

        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawAsteroids() {
            ctx.strokeStyle = '#aaaaaa';
            ctx.lineWidth = 2;

            asteroids.forEach(asteroid => {
                ctx.beginPath();
                ctx.moveTo(asteroid.x + asteroid.vertices[0].x, asteroid.y + asteroid.vertices[0].y);
                for (let i = 1; i < asteroid.vertices.length; i++) {
                    ctx.lineTo(asteroid.x + asteroid.vertices[i].x, asteroid.y + asteroid.vertices[i].y);
                }
                ctx.closePath();
                ctx.stroke();
            });
        }

        function update() {
            if (gameOver) return;

            // Ship rotation
            if (keys['ArrowLeft']) ship.angle -= 0.1;
            if (keys['ArrowRight']) ship.angle += 0.1;

            // Ship thrust
            if (keys['ArrowUp']) {
                ship.vx += Math.cos(ship.angle) * 0.1;
                ship.vy += Math.sin(ship.angle) * 0.1;
            }

            // Apply friction
            ship.vx *= 0.99;
            ship.vy *= 0.99;

            // Update ship position
            ship.x += ship.vx;
            ship.y += ship.vy;

            // Wrap around screen
            if (ship.x < 0) ship.x = canvas.width;
            if (ship.x > canvas.width) ship.x = 0;
            if (ship.y < 0) ship.y = canvas.height;
            if (ship.y > canvas.height) ship.y = 0;

            // Shooting
            if (keys[' '] && bullets.length < 10) {
                if (!keys.shootCooldown || Date.now() - keys.shootCooldown > 150) {
                    bullets.push({
                        x: ship.x + Math.cos(ship.angle) * ship.radius,
                        y: ship.y + Math.sin(ship.angle) * ship.radius,
                        vx: Math.cos(ship.angle) * 8 + ship.vx * 0.5,
                        vy: Math.sin(ship.angle) * 8 + ship.vy * 0.5,
                        life: 60
                    });
                    keys.shootCooldown = Date.now();
                }
            }

            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                bullet.life--;

                // Wrap bullets
                if (bullet.x < 0) bullet.x = canvas.width;
                if (bullet.x > canvas.width) bullet.x = 0;
                if (bullet.y < 0) bullet.y = canvas.height;
                if (bullet.y > canvas.height) bullet.y = 0;

                return bullet.life > 0;
            });

            // Update asteroids
            asteroids.forEach(asteroid => {
                asteroid.x += asteroid.vx;
                asteroid.y += asteroid.vy;

                // Wrap asteroids
                if (asteroid.x < -asteroid.radius) asteroid.x = canvas.width + asteroid.radius;
                if (asteroid.x > canvas.width + asteroid.radius) asteroid.x = -asteroid.radius;
                if (asteroid.y < -asteroid.radius) asteroid.y = canvas.height + asteroid.radius;
                if (asteroid.y > canvas.height + asteroid.radius) asteroid.y = -asteroid.radius;
            });

            // Check bullet-asteroid collisions
            bullets.forEach((bullet, bulletIndex) => {
                asteroids.forEach((asteroid, asteroidIndex) => {
                    const dist = Math.hypot(bullet.x - asteroid.x, bullet.y - asteroid.y);
                    if (dist < asteroid.radius) {
                        bullets.splice(bulletIndex, 1);
                        asteroids.splice(asteroidIndex, 1);

                        // Split asteroid
                        if (asteroid.radius > 20) {
                            asteroids.push(createAsteroid(asteroid.x, asteroid.y, asteroid.radius * 0.6));
                            asteroids.push(createAsteroid(asteroid.x, asteroid.y, asteroid.radius * 0.6));
                        }

                        score += Math.round(100 / asteroid.radius * 20);
                        document.getElementById('score').textContent = score;
                    }
                });
            });

            // Check ship-asteroid collisions
            asteroids.forEach(asteroid => {
                const dist = Math.hypot(ship.x - asteroid.x, ship.y - asteroid.y);
                if (dist < ship.radius + asteroid.radius) {
                    lives--;
                    document.getElementById('lives').textContent = lives;

                    if (lives <= 0) {
                        endGame();
                    } else {
                        // Reset ship position
                        ship.x = canvas.width / 2;
                        ship.y = canvas.height / 2;
                        ship.vx = 0;
                        ship.vy = 0;
                        ship.angle = -Math.PI / 2;
                    }
                }
            });

            // Spawn new asteroids
            if (asteroids.length < 3) {
                const side = Math.floor(Math.random() * 4);
                let x, y;
                switch(side) {
                    case 0: x = Math.random() * canvas.width; y = -30; break;
                    case 1: x = canvas.width + 30; y = Math.random() * canvas.height; break;
                    case 2: x = Math.random() * canvas.width; y = canvas.height + 30; break;
                    case 3: x = -30; y = Math.random() * canvas.height; break;
                }
                asteroids.push(createAsteroid(x, y, 40 + Math.random() * 20));
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawShip();
            drawBullets();
            drawAsteroids();
        }

        function gameLoopFn() {
            update();
            draw();
            if (!gameOver) {
                gameLoop = requestAnimationFrame(gameLoopFn);
            }
        }

        function startGame() {
            ship = { x: 200, y: 250, angle: -Math.PI / 2, vx: 0, vy: 0, radius: 15 };
            bullets = [];
            score = 0;
            lives = 3;
            gameOver = false;

            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('gameOver').classList.remove('show');

            initAsteroids();
            gameLoopFn();
        }

        function endGame() {
            gameOver = true;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mobile controls
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const fireBtn = document.getElementById('fireBtn');

        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
        leftBtn.addEventListener('touchend', () => keys['ArrowLeft'] = false);
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
        rightBtn.addEventListener('touchend', () => keys['ArrowRight'] = false);
        fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[' '] = true; });
        fireBtn.addEventListener('touchend', () => keys[' '] = false);

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        startGame();
    </script>
</body>
</html>
